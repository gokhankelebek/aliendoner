<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Lost in space (404) — Alien Döner</title>
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#060714">
  <link rel="icon" type="image/png" href="/images/logo-mark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
<script>(function(){try{var t=new URLSearchParams(location.search).get('theme');if(t==='warm')sessionStorage.setItem('adTheme','warm');else if(t==='default')sessionStorage.removeItem('adTheme');if(sessionStorage.getItem('adTheme')==='warm')document.head.insertAdjacentHTML('beforeend','<link rel="stylesheet" href="/css/warm.css">');}catch(e){}})();</script>

  <style>
    .nf { min-height: 100svh; display: grid; place-items: center; text-align: center; padding: 24px; }
    .nf-inner { max-width: 620px; }
    .nf-code { font-family: var(--font-display); font-weight: 700; font-size: clamp(5rem, 20vw, 11rem); line-height: 1; margin-bottom: 8px; }
    .nf h1 { font-size: clamp(1.6rem, 4vw, 2.4rem); margin-bottom: 18px; }
    .nf p { color: var(--text-dim); font-size: 1.1rem; margin-bottom: 32px; }
    .nf-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .nf-ufo { width: 120px; margin: 0 auto 24px; animation: hover-bob 4s ease-in-out infinite; filter: drop-shadow(0 10px 30px rgba(124,92,255,0.5)); }
  </style>
</head>
<body id="top">
  <a class="skip-link" href="#maincontent">Skip to content</a>
  <canvas id="starfield" aria-hidden="true"></canvas>
  <div class="nebula nebula-1" aria-hidden="true"></div>
  <div class="nebula nebula-2" aria-hidden="true"></div>

  <main id="maincontent" tabindex="-1" class="nf">
    <div class="nf-inner">
      <img class="nf-ufo" src="/images/logo-mark.png" alt="" width="120" height="116" aria-hidden="true">
      <p class="nf-code grad-text">404</p>
      <h1>This page drifted into a black hole.</h1>
      <p>The page you're looking for isn't in this galaxy — but the döner is very much still here.</p>
      <div class="nf-actions">
        <a class="btn btn-primary" href="/">Back to home</a>
        <a class="btn btn-ghost" href="/menu.html">See the menu</a>
      </div>
    </div>
  </main>

  <script src="/js/main.js" defer></script>
</body>
</html>
